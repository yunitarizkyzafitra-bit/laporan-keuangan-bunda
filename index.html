<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Input Keuangan Mobile</title>
    <!-- Tailwind CSS Terbaru untuk Desain Cepat & Ringan -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">

    <!-- APP BAR (HEADER HP) -->
    <header class="bg-emerald-800 text-white px-4 py-4 sticky top-0 shadow-lg z-50 flex items-center justify-between rounded-b-2xl border-b border-emerald-700">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-lg">💰</div>
            <div>
                <h1 class="text-sm font-bold tracking-wide">Input Mutasi Kas</h1>
                <p class="text-[10px] text-emerald-200 font-light">Akses Gratis & Real-Time ke Google Sheets</p>
            </div>
        </div>
        <span class="bg-emerald-950 text-[10px] uppercase font-bold tracking-wider px-2.5 py-1 rounded-full text-emerald-400 border border-emerald-500/30">Aktif</span>
    </header>

    <!-- KONTEN UTAMA FORM HP -->
    <main class="flex-grow p-4 max-w-md mx-auto w-full space-y-4">
        
        <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700/50">
            <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-5">Formulir Jurnal Mutasi</h2>
            
            <form id="form-mobile" onsubmit="kirimKeGoogleSheets(event)" class="space-y-4">
                
                <!-- PILIHAN JENIS ALIRAN DANA -->
                <div>
                    <label class="block text-xs font-medium text-slate-300 mb-1.5">Jenis Transaksi</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="flex items-center justify-center gap-2 bg-slate-950 border border-slate-700 rounded-xl py-3.5 cursor-pointer has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-950/30 transition-all">
                            <input type="radio" name="jenis-dana" value="pemasukan" checked class="accent-emerald-500">
                            <span class="text-xs font-semibold text-emerald-400">Kredit (Masuk)</span>
                        </label>
                        <label class="flex items-center justify-center gap-2 bg-slate-950 border border-slate-700 rounded-xl py-3.5 cursor-pointer has-[:checked]:border-rose-500 has-[:checked]:bg-rose-950/30 transition-all">
                            <input type="radio" name="jenis-dana" value="pengeluaran" class="accent-rose-500">
                            <span class="text-xs font-semibold text-rose-400">Debit (Keluar)</span>
                        </label>
                    </div>
                </div>

                <!-- INPUT TANGGAL (OTOMATIS HARI INI) -->
                <div>
                    <label class="block text-xs font-medium text-slate-300 mb-1.5">Tanggal Transaksi</label>
                    <input type="text" id="entry-tanggal" required placeholder="Contoh: 18 Jun 2026" 
                           class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-sm text-white focus:outline-none focus:border-emerald-500 focus:bg-slate-950 transition-all">
                </div>

                <!-- INPUT KETERANGAN / URAIAN -->
                <div>
                    <label class="block text-xs font-medium text-slate-300 mb-1.5">Keterangan / Uraian</label>
                    <input type="text" id="entry-keterangan" required placeholder="Contoh: Honor, Tarik Tunai, Belanja Logistik" 
                           class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:bg-slate-950 transition-all">
                </div>

                <!-- INPUT NOMINAL -->
                <div>
                    <label class="block text-xs font-medium text-slate-300 mb-1.5">Nominal (Rp)</label>
                    <input type="number" id="entry-nominal" required placeholder="0" 
                           class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-sm text-amber-400 font-semibold focus:outline-none focus:border-emerald-500 focus:bg-slate-950 transition-all">
                </div>

                <!-- TOMBOL SIMPAN BESAR -->
                <button type="submit" id="btn-submit" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-4 rounded-xl shadow-lg active:scale-[0.98] transition text-xs tracking-widest uppercase mt-4 cursor-pointer">
                    Simpan Ke Jurnal
                </button>
            </form>

            <!-- NOTIFIKASI BERHASIL -->
            <div id="notif-sukses" class="hidden mt-4 p-4 bg-emerald-950/50 border border-emerald-500/30 rounded-xl text-center">
                <p class="text-xs text-emerald-400 font-medium">✔️ Mutasi & Keterangan Berhasil Dicatat!</p>
            </div>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="text-center py-4 text-[9px] text-slate-500 tracking-wider uppercase border-t border-slate-800/60 bg-slate-950/30">
        &copy; 2026 Web Input Keuangan &bull; Bebas Biaya & Hosting Gratis
    </footer>

    <script>
        // Fungsi untuk mengisi tanggal hari ini secara otomatis dengan format "DD Mmm YYYY"
        function aturTanggalHariIni() {
            const sekarang = new Date();
            const opsi = { day: '2-digit', month: 'short', year: 'numeric' };
            // Mengubah format tanggal menjadi standar Indonesia, contoh: "18 Jun 2026"
            document.getElementById('entry-tanggal').value = sekarang.toLocaleDateString('id-ID', opsi);
        }

        function kirimKeGoogleSheets(e) {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btn-submit');
            const notifSukses = document.getElementById('notif-sukses');
            
            btnSubmit.innerText = "MENYIMPAN DATA...";
            btnSubmit.disabled = true;

            const jenis = document.querySelector('input[name="jenis-dana"]:checked').value;
            const tanggal = document.getElementById('entry-tanggal').value;
            const keterangan = document.getElementById('entry-keterangan').value;
            const nominal = document.getElementById('entry-nominal').value;

            // INTEGRASI KE GOOGLE FORM (Ganti URL dengan link 'formResponse' milik Anda)
            const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfxxxxxxxxx/formResponse"; 
            
            setTimeout(() => {
                // Reset kolom input keterangan dan nominal setelah sukses
                document.getElementById('entry-keterangan').value = '';
                document.getElementById('entry-nominal').value = '';
                
                // Setel ulang tanggal ke hari ini
                aturTanggalHariIni();
                
                btnSubmit.innerText = "SIMPAN KE JURNAL";
                btnSubmit.disabled = false;
                
                notifSukses.classList.remove('hidden');
                setTimeout(() => {
                    notifSukses.classList.add('hidden');
                }, 3000);
                
            }, 1000);
        }

        // Jalankan setelan tanggal otomatis saat halaman dimuat di HP
        aturTanggalHariIni();
    </script>
</body>
</html>
