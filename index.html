<script>
    const CORRECT_PASSWORD = "bismillah";
    
    // ================= CONFIGURASI INTEGRASI FORM ANDA =================
    // 1. Ambil ID dari URL Google Form Pratinjau Anda
    const GOOGLE_FORM_ID = "1ImOFGsbHiXauFDrmHz756zyUJu_ABC7HqjAxlk8SZP8"; 

    // 2. Klik kanan - Inspect Element pada masing-masing kotak input di Form untuk melihat nomor entry-nya
    const CONFIG_IDS = {
        jenis: "entry.11111111",       // Ganti dengan angka entry Jenis Anda
        tanggal: "entry.22222222",     // Ganti dengan angka entry Tanggal Anda
        keterangan: "entry.33333333",  // Ganti dengan angka entry Keterangan Anda
        nominal: "entry.44444444"      // Ganti dengan angka entry Nominal Anda
    };
    // =====================================================================

    function checkPassword() {
        if (document.getElementById('password-input').value === CORRECT_PASSWORD) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            setupFormAttributes();
            aturHariIni();
        } else {
            document.getElementById('login-error').classList.remove('hidden');
        }
    }

    function setupFormAttributes() {
        const form = document.getElementById('form-transaksi');
        form.action = `https://docs.google.com/forms/d/e/${GOOGLE_FORM_ID}/formResponse`;
        
        document.getElementById('form-date').setAttribute('name', CONFIG_IDS.tanggal);
        document.getElementById('form-desc').setAttribute('name', CONFIG_IDS.keterangan);
        document.getElementById('form-amount').setAttribute('name', CONFIG_IDS.nominal);
        
        const radios = document.querySelectorAll('input[name="jenis"]');
        radios.forEach(radio => radio.setAttribute('name', CONFIG_IDS.jenis));
    }

    function sendDataToSpreadsheet(e) {
        const btnSubmit = document.getElementById('btn-submit');
        const notifSukses = document.getElementById('notif-sukses');
        
        btnSubmit.innerText = "MENGIRIM...";
        btnSubmit.disabled = true;

        setTimeout(() => {
            document.getElementById('form-desc').value = '';
            document.getElementById('form-amount').value = '';
            aturHariIni();
            
            btnSubmit.innerText = "SIMPAN KE GOOGLE SHEETS";
            btnSubmit.disabled = false;
            
            notifSukses.classList.remove('hidden');
            setTimeout(() => { notifSukses.classList.add('hidden'); }, 3000);
        }, 1000);
    }

    function aturHariIni() {
        const sekarang = new Date();
        document.getElementById('form-date').value = sekarang.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
    }
</script>
