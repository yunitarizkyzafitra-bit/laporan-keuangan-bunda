<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keuangan Cloud Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .premium-glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-50 flex flex-col justify-center items-center px-6">
        <div class="w-full max-w-sm text-center space-y-6">
            <div class="w-16 h-16 bg-emerald-500/10 rounded-2xl flex items-center justify-center mx-auto border border-emerald-500/30 shadow-lg">
                <svg class="w-7 h-7 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-wide">Akses Jurnal Terkunci</h1>
                <p class="text-xs text-slate-400 mt-1">Masukkan kata sandi aman pengelola keuangan</p>
            </div>
            <div class="space-y-3 text-left">
                <div class="relative flex items-center bg-slate-900 border border-slate-700 rounded-xl overflow-hidden focus-within:border-emerald-500 transition-all">
                    <input type="password" id="password-input" placeholder="Kata Sandi Keamanan" class="w-full bg-transparent px-4 py-3.5 text-center text-emerald-400 placeholder-slate-600 focus:outline-none tracking-widest text-base">
                </div>
                <button onclick="checkPassword()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl transition shadow-md text-xs tracking-wider uppercase cursor-pointer">Buka Lembar Jurnal</button>
                <p id="login-error" class="text-rose-400 text-center text-xs hidden pt-1">Kata sandi keliru.</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex-grow flex flex-col justify-between">
        <header class="bg-slate-900 px-4 py-4 sticky top-0 shadow-md z-40 flex items-center justify-between border-b border-slate-800">
            <div class="flex items-center gap-2.5">
                <span class="text-xl">📊</span>
                <div>
                    <h1 class="text-xs font-bold uppercase tracking-wider text-emerald-400">Jurnal Kas Cloud</h1>
                    <p class="text-[10px] text-slate-400">Terhubung ke Google Sheets</p>
                </div>
            </div>
            <button onclick="logout()" class="text-[9px] font-bold uppercase tracking-widest bg-slate-800 border border-slate-700 px-2.5 py-1.5 rounded-lg hover:text-rose-400 transition cursor-pointer">Kunci</button>
        </header>

        <main class="p-4 max-w-md mx-auto w-full space-y-4">
            <div class="premium-glass p-5 rounded-xl space-y-3.5">
                <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Input Jurnal Baru</h2>
                
                <iframe name="v_iframe" id="v_iframe" class="hidden"></iframe>

                <form id="form-transaksi" action="" method="POST" target="v_iframe" onsubmit="sendDataCloud(event)" class="space-y-4">
                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-1.5">Jenis Transaksi</label>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="flex items-center justify-center gap-1.5 bg-slate-900 border border-slate-700 py-3 rounded-lg cursor-pointer has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-950/20">
                                <input type="radio" name="entry.JENIS_ID" value="Pemasukan" checked class="accent-emerald-500">
                                <span class="text-xs font-medium text-emerald-400">Kredit (Masuk)</span>
                            </label>
                            <label class="flex items-center justify-center gap-1.5 bg-slate-900 border border-slate-700 py-3 rounded-lg cursor-pointer has-[:checked]:border-rose-500 has-[:checked]:bg-rose-950/20">
                                <input type="radio" name="entry.JENIS_ID" value="Pengeluaran" class="accent-rose-500">
                                <span class="text-xs font-medium text-rose-400">Debit (Keluar)</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-1">Tanggal</label>
                        <input type="text" id="form-date" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-3 text-sm text-white focus:outline-none focus:border-emerald-500">
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-1">Keterangan / Uraian</label>
                        <input type="text" id="form-desc" required placeholder="Contoh: Belanja ATK, Honor, Logistik" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-3 text-sm text-white focus:outline-none focus:border-emerald-500">
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-1">Nominal (Rp)</label>
                        <input type="number" id="form-amount" required placeholder="0" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-3.5 text-base text-amber-400 font-bold focus:outline-none focus:border-emerald-500">
                    </div>

                    <button type="submit" id="btn-submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl transition shadow-lg text-xs tracking-wider uppercase mt-2 cursor-pointer">
                        Kirim ke Google Sheets
                    </button>
                </form>

                <div id="notif-sukses" class="hidden p-4 bg-emerald-950/50 border border-emerald-500/30 rounded-xl text-center">
                    <p class="text-xs text-emerald-400 font-medium">✔️ Berhasil Disinkronkan ke Spreadsheet!</p>
                </div>
            </div>
        </main>

        <footer class="text-center py-4 text-[8px] text-slate-600 tracking-wider uppercase bg-slate-950">
            &copy; 2026 Cloud Ledger System
        </footer>
    </div>

    <script>
        const CORRECT_PASSWORD = "bismillah";

        // ================= CONFIGURASI INTEGRASI SPREADSHEET =================
        // Masukkan ID dan nomor entry Google Form Anda yang terhubung dengan Excel Laporan Keuangan
        const GOOGLE_FORM_ID = "1YBw5YAQJnq0g7ZzoDU8EfDEudfLWAwpyd5QGPeuXVgU"; 
        const CONFIG_IDS = {
            jenis: "entry.11111111",       
            tanggal: "entry.22222222",     
            keterangan: "entry.33333333",  
            nominal: "entry.44444444"      
        };
        // =====================================================================

        function checkPassword() {
            if (document.getElementById('password-input').value === CORRECT_PASSWORD) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                setupFormAttributes();
                aturHariIni();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() {
            document.getElementById('password-input').value = '';
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }

        function aturHariIni() {
            const sekarang = new Date();
            document.getElementById('form-date').value = calculusDate(sekarang);
        }

        function calculusDate(date) {
            const day = String(date.getDate()).padStart(2, '0');
            const months = ["Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec", "Jan", "Feb"];
            const monthStr = months[date.getMonth() - 2] || "Jun"; 
            return `${day} ${monthStr} ${date.getFullYear()}`;
        }

        function setupFormAttributes() {
            const form = document.getElementById('form-transaksi');
            form.action = `https://docs.google.com/forms/d/e/${1YBw5YAQJnq0g7ZzoDU8EfDEudfLWAwpyd5QGPeuXVgU}/formResponse`;
            
            document.getElementById('form-date').setAttribute('name', CONFIG_IDS.tanggal);
            document.getElementById('form-desc').setAttribute('name', CONFIG_IDS.keterangan);
            document.getElementById('form-amount').setAttribute('name', CONFIG_IDS.nominal);
            
            const radios = document.querySelectorAll('input[name="entry.JENIS_ID"]');
            radios.forEach(radio => radio.setAttribute('name', CONFIG_IDS.jenis));
        }

        function sendDataCloud(e) {
            const btnSubmit = document.getElementById('btn-submit');
            const notifSukses = document.getElementById('notif-sukses');
            
            btnSubmit.innerText = "MENGIRIM KE CLOUD...";
            btnSubmit.disabled = true;

            setTimeout(() => {
                document.getElementById('form-desc').value = '';
                document.getElementById('form-amount').value = '';
                aturHariIni();
                
                btnSubmit.innerText = "KIRIM KE GOOGLE SHEETS";
                btnSubmit.disabled = false;
                
                notifSukses.classList.remove('hidden');
                setTimeout(() => { notifSukses.classList.add('hidden'); }, 3500);
            }, 1000);
        }
    </script>
</body>
</html>
