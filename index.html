<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Ledger System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* Efek Gradasi Hijau Relaks Menyegarkan Mata */
        .neon-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 50%, #047857 100%); }
        .glass-card { background: rgba(6, 78, 59, 0.25); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.06); }
    </style>
</head>
<body class="bg-[#020603] text-slate-100 min-h-screen flex flex-col justify-between overflow-x-hidden">

    <div id="login-screen" class="fixed inset-0 bg-[#020603] z-50 flex flex-col justify-between p-8">
        <div class="absolute top-[-20%] left-[-20%] w-[80%] h-[50%] bg-emerald-950 rounded-full opacity-30 blur-[120px] pointer-events-none"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[40%] bg-emerald-900 rounded-full opacity-20 blur-[100px] pointer-events-none"></div>

        <div class="flex-grow flex flex-col justify-center max-w-sm w-full mx-auto space-y-8 z-10">
            <div class="space-y-2">
                <h1 class="text-3xl font-bold tracking-tight text-emerald-400">Welcome back</h1>
                <p class="text-sm text-emerald-700/80">Masukkan kata sandi aman pengelola keuangan</p>
            </div>

            <div class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold tracking-widest text-emerald-600 uppercase">Security Password</label>
                    <div class="relative flex items-center bg-[#04110a] border border-emerald-950 rounded-xl overflow-hidden focus-within:border-emerald-500 transition-all pr-3">
                        <input type="password" id="password-input" placeholder="••••••••" class="w-full bg-transparent pl-4 pr-12 py-4 text-emerald-400 placeholder-emerald-950 focus:outline-none tracking-widest text-base">
                        
                        <button type="button" onclick="togglePassword()" class="absolute right-4 text-emerald-800 hover:text-emerald-400 focus:outline-none cursor-pointer z-20">
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button onclick="checkPassword()" class="w-full neon-gradient text-white font-bold py-4 rounded-xl transition transform active:scale-95 shadow-lg shadow-emerald-900/30 text-xs tracking-widest uppercase cursor-pointer mt-2">
                    Sign In
                </button>
                <p id="login-error" class="text-rose-400 text-center text-xs font-medium hidden">❌ Kata sandi salah. Gunakan huruf kecil semua.</p>
            </div>
        </div>
        <div class="text-center text-[10px] text-emerald-900 tracking-widest uppercase z-10">Green Cloud Ledger v2.0</div>
    </div>

    <div id="main-app" class="hidden flex-grow flex flex-col justify-between z-10">
        <header class="bg-[#020603]/90 backdrop-blur-md px-4 py-4 sticky top-0 shadow-lg z-40 flex items-center justify-between border-b border-emerald-950/50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-emerald-800 flex items-center justify-center text-sm shadow-md">🌿</div>
                <div>
                    <h1 class="text-xs font-bold uppercase tracking-wider text-emerald-400">Jurnal Kas Utama</h1>
                    <p class="text-[10px] text-emerald-600">Hijau Relaks Edition</p>
                </div>
            </div>
            <button onclick="logout()" class="text-[9px] font-bold uppercase tracking-widest bg-emerald-950 border border-emerald-900/60 px-3 py-2 rounded-lg text-emerald-400 hover:text-rose-400 transition cursor-pointer">Lock</button>
        </header>

        <main class="p-4 max-w-md mx-auto w-full space-y-4 flex-grow flex flex-col justify-center">
            <div class="glass-card p-6 rounded-2xl space-y-4 shadow-2xl">
                <h2 class="text-xs font-bold uppercase tracking-widest text-emerald-400 mb-2">Input Transaksi Baru</h2>

                <form id="form-transaksi" onsubmit="sendDataCloud(event)" class="space-y-4">
                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-wider text-emerald-600 mb-2">Jenis Transaksi</label>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="flex items-center justify-center gap-2 bg-[#04110a] border border-emerald-950 py-3.5 rounded-xl cursor-pointer has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-950/30">
                                <input type="radio" name="jenis" value="Kredit (Pemasukan)" checked class="accent-emerald-500">
                                <span class="text-xs font-semibold text-emerald-400">Kredit (Masuk)</span>
                            </label>
                            <label class="flex items-center justify-center gap-2 bg-[#04110a] border border-emerald-950 py-3.5 rounded-xl cursor-pointer has-[:checked]:border-rose-500 has-[:checked]:bg-rose-950/20">
                                <input type="radio" name="jenis" value="Debit (Pengeluaran)" class="accent-rose-500">
                                <span class="text-xs font-semibold text-rose-400">Debit (Keluar)</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-wider text-emerald-600 mb-1.5">Kategori</label>
                        <select id="form-kategori" class="w-full bg-[#04110a] border border-emerald-950 rounded-xl px-3 py-3 text-sm text-emerald-300 focus:outline-none focus:border-emerald-500">
                            <option value="Tarik Tunai">Tarik Tunai</option>
                            <option value="Operasional">Operasional</option>
                            <option value="Admin Bank">Admin Bank</option>
                            <option value="Komunikasi">Komunikasi</option>
                            <option value="Piutang">Piutang</option>
                            <option value="Utang">Utang</option>
                            <option value="Transfer Internal">Transfer Internal</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-wider text-emerald-600 mb-1.5">Keterangan / Uraian</label>
                        <input type="text" id="form-desc" required placeholder="Tulis detail catatan..." class="w-full bg-[#04110a] border border-emerald-950 rounded-xl px-3 py-3 text-sm text-white focus:outline-none focus:border-emerald-500">
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-wider text-emerald-600 mb-1.5">Nominal (Rp)</label>
                        <input type="number" id="form-amount" required placeholder="0" class="w-full bg-[#04110a] border border-emerald-950 rounded-xl px-3 py-3.5 text-base text-amber-400 font-bold focus:outline-none focus:border-emerald-500">
                    </div>

                    <button type="submit" id="btn-submit" class="w-full neon-gradient text-white font-bold py-4 rounded-xl transition shadow-lg shadow-emerald-900/20 text-xs tracking-wider uppercase mt-2 cursor-pointer">
                        Simpan ke Cloud Sheets
                    </button>
                </form>

                <div id="notif-sukses" class="hidden p-4 bg-emerald-950/40 border border-emerald-500/30 rounded-xl text-center">
                    <p class="text-xs text-emerald-400 font-medium">✔️ Berhasil Disinkronkan ke Sheet Kedua!</p>
                </div>
            </div>
        </main>

        <footer class="text-center py-4 text-[8px] text-emerald-900 tracking-widest uppercase bg-[#020603]">
            &copy; 2026 Green Ledger System • Secure Cloud
        </footer>
    </div>

    <script>
        // Setelan Kata Sandi Anda
        const CORRECT_PASSWORD = "bismillah";

        // PENTING: Ganti teks di bawah ini dengan tautan Web App panjang dari Google Sheets Anda
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxIafdFaqn9uTKi92dk7K4c1cOKvoTb5WGue_WqHsaN0Nd11tm3lixsaYsnjrGWepMgMQ/exec";

        // Fungsi Tombol Mata Intip Sandi
        function togglePassword() {
            const pwdInput = document.getElementById('password-input');
            const eyeIcon = document.getElementById('eye-icon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                // Mengubah ikon menjadi mata terbuka / coret
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.822 7.822 3 3m-3-3-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.243 4.243L9.878 9.878" />`;
            } else {
                pwdInput.type = 'password';
                // Mengembalikan ke ikon mata normal
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />`;
            }
        }

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === CORRECT_PASSWORD) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('login-error').classList.add('hidden');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() {
            document.getElementById('password-input').value = '';
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }

        async function sendDataCloud(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btn-submit');
            const notifSukses = document.getElementById('notif-sukses');
            
            btnSubmit.innerText = "MENGIRIM DATA...";
            btnSubmit.disabled = true;

            const data = {
                jenis: document.querySelector('input[name="jenis"]:checked').value,
                kategori: document.getElementById('form-kategori').value,
                keterangan: document.getElementById('form-desc').value,
                nominal: document.getElementById('form-amount').value
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                document.getElementById('form-desc').value = '';
                document.getElementById('form-amount').value = '';
                
                notifSukses.classList.remove('hidden');
                setTimeout(() => { notifSukses.classList.add('hidden'); }, 3000);
            } catch (err) {
                alert("Gagal sinkron. Pastikan URL Web App Anda sudah benar.");
            }
            
            btnSubmit.innerText = "SIMPAN KE CLOUD SHEETS";
            btnSubmit.disabled = false;
        }
    </script>
</body>
</html>
