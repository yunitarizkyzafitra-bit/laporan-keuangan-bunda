<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Ledger System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* Gradasi Hijau Relaks (Emerald & Sage) */
        .neon-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 50%, #065f46 100%); }
        .glass-card { background: rgba(6, 78, 59, 0.2); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-[#020603] text-slate-100 min-h-screen flex flex-col justify-between overflow-x-hidden">

    <!-- GERBANG LOGIN -->
    <div id="login-screen" class="fixed inset-0 bg-[#020603] z-50 flex flex-col justify-between p-8">
        <div class="absolute top-[-20%] left-[-20%] w-[80%] h-[50%] bg-emerald-900 rounded-full opacity-20 blur-[120px] pointer-events-none"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[40%] bg-emerald-800 rounded-full opacity-15 blur-[100px] pointer-events-none"></div>

        <div class="flex-grow flex flex-col justify-center max-w-sm w-full mx-auto space-y-8 z-10">
            <div class="space-y-2">
                <h1 class="text-3xl font-bold tracking-tight text-emerald-400">Welcome back</h1>
                <p class="text-sm text-emerald-700">Access your financial ledger safely</p>
            </div>

            <div class="space-y-4">
                <div class="relative flex items-center bg-[#05100d] border border-emerald-900 rounded-xl overflow-hidden focus-within:border-emerald-500 transition-all pr-3">
                    <input type="password" id="password-input" placeholder="••••••••" class="w-full bg-transparent pl-4 pr-10 py-3.5 text-emerald-400 placeholder-emerald-900 focus:outline-none tracking-widest text-base">
                    <button type="button" onclick="togglePassword()" class="absolute right-3 text-emerald-800 hover:text-emerald-400 focus:outline-none cursor-pointer">
                        <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </button>
                </div>
                <button onclick="checkPassword()" class="w-full neon-gradient text-white font-bold py-4 rounded-xl transition transform active:scale-95 shadow-lg shadow-emerald-900/20 text-xs tracking-widest uppercase cursor-pointer mt-2">
                    Sign In
                </button>
                <p id="login-error" class="text-rose-500 text-center text-xs hidden">Password salah.</p>
            </div>
        </div>
        <div class="text-center text-[10px] text-emerald-900 tracking-widest uppercase z-10">Green Ledger v2.0</div>
    </div>

    <!-- UTAMA DASHBOARD -->
    <div id="main-app" class="hidden flex-grow flex flex-col justify-between z-10">
        <header class="bg-[#020603]/80 backdrop-blur-md px-4 py-4 sticky top-0 shadow-lg z-40 flex items-center justify-between border-b border-emerald-950">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-emerald-700 flex items-center justify-center text-sm shadow-md">🌿</div>
                <div>
                    <h1 class="text-xs font-bold uppercase tracking-wider text-emerald-400">Jurnal Kas</h1>
                    <p class="text-[10px] text-emerald-700">Hijau Relaks Edition</p>
                </div>
            </div>
            <button onclick="logout()" class="text-[9px] font-bold uppercase tracking-widest bg-emerald-950 border border-emerald-900 px-3 py-2 rounded-lg hover:text-rose-400 transition cursor-pointer">Lock</button>
        </header>

        <main class="p-4 max-w-md mx-auto w-full space-y-4 flex-grow flex flex-col justify-center">
            <div class="glass-card p-6 rounded-2xl space-y-4 shadow-2xl">
                <h2 class="text-xs font-bold uppercase tracking-widest text-emerald-400 mb-2">Input Jurnal Baru</h2>

                <form id="form-transaksi" onsubmit="sendDataCloud(event)" class="space-y-4">
                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-wider text-emerald-700 mb-2">Jenis Transaksi</label>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="flex items-center justify-center gap-2 bg-[#05100d] border border-emerald-900 py-3 rounded-xl cursor-pointer has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-950/20">
                                <input type="radio" name="jenis" value="Kredit (Pemasukan)" checked class="accent-emerald-500">
                                <span class="text-xs font-medium text-emerald-400">Kredit (Masuk)</span>
                            </label>
                            <label class="flex items-center justify-center gap-2 bg-[#05100d] border border-emerald-900 py-3 rounded-xl cursor-pointer has-[:checked]:border-rose-500 has-[:checked]:bg-rose-950/20">
                                <input type="radio" name="jenis" value="Debit (Pengeluaran)" class="accent-rose-500">
                                <span class="text-xs font-medium text-rose-400">Debit (Keluar)</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-wider text-emerald-700 mb-1.5">Kategori</label>
                        <select id="form-kategori" class="w-full bg-[#05100d] border border-emerald-900 rounded-xl px-3 py-3 text-sm text-emerald-400 focus:outline-none focus:border-emerald-500">
                            <option value="Tarik Tunai">Tarik Tunai</option>
                            <option value="Operasional">Operasional</option>
                            <option value="Admin Bank">Admin Bank</option>
                            <option value="Komunikasi">Komunikasi</option>
                            <option value="Piutang">Piutang</option>
                            <option value="Utang">Utang</option>
                            <option value="Transfer Internal">Transfer Internal</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-wider text-emerald-700 mb-1.5">Keterangan / Uraian</label>
                        <input type="text" id="form-desc" required placeholder="Detail catatan..." class="w-full bg-[#05100d] border border-emerald-900 rounded-xl px-3 py-3 text-sm text-white focus:outline-none focus:border-emerald-500">
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-wider text-emerald-700 mb-1.5">Nominal (Rp)</label>
                        <input type="number" id="form-amount" required placeholder="0" class="w-full bg-[#05100d] border border-emerald-900 rounded-xl px-3 py-3.5 text-base text-amber-500 font-bold focus:outline-none focus:border-emerald-500">
                    </div>

                    <button type="submit" id="btn-submit" class="w-full neon-gradient text-white font-bold py-4 rounded-xl transition shadow-lg shadow-emerald-900/10 text-xs tracking-wider uppercase mt-2 cursor-pointer">
                        Kirim ke Google Sheets
                    </button>
                </form>

                <div id="notif-sukses" class="hidden p-4 bg-emerald-950/50 border border-emerald-500/30 rounded-xl text-center">
                    <p class="text-xs text-emerald-400 font-medium">✔️ Berhasil Disinkronkan!</p>
                </div>
            </div>
        </main>

        <footer class="text-center py-4 text-[8px] text-emerald-900 tracking-widest uppercase bg-[#020603]">
            &copy; 2026 Green Ledger System
        </footer>
    </div>

    <script>
        const CORRECT_PASSWORD = "bismillah";
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzGuDMznKXTPlnUhF759H4X1KA9hQpnDWArvOVXzE7sg8VtUcId5RNWAfqADCJmh60u/exec";

        function togglePassword() {
            const pwdInput = document.getElementById('password-input');
            pwdInput.type = (pwdInput.type === 'password') ? 'text' : 'password';
        }

        function checkPassword() {
            if (document.getElementById('password-input').value === CORRECT_PASSWORD) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }

        async function sendDataCloud(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.innerText = "MENGIRIM...";
            
            const data = {
                jenis: document.querySelector('input[name="jenis"]:checked').value,
                kategori: document.getElementById('form-kategori').value,
                keterangan: document.getElementById('form-desc').value,
                nominal: document.getElementById('form-amount').value
            };

            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
                document.getElementById('notif-sukses').classList.remove('hidden');
                document.getElementById('form-desc').value = '';
                document.getElementById('form-amount').value = '';
            } catch (err) { alert("Periksa kembali URL Web App Anda."); }
            
            btnSubmit.innerText = "KIRIM KE GOOGLE SHEETS";
        }
    </script>
</body>
</html>
